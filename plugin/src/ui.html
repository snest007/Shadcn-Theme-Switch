<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadcn Theme Switch</title>
    <style>
      :root {
        --shell-bg: #161616;
        --shell-border: #c6c6c6;
        --content-bg: #f4f4f4;
        --panel-bg: #0f0f0f;
        --panel-top: #0f62fe;
        --metric-bg: #262626;
        --metric-border: #393939;
        --button-primary: #0f62fe;
        --button-primary-hover: #0353e9;
        --button-secondary: #393939;
        --button-secondary-hover: #4c4c4c;
        --text-primary: #161616;
        --text-inverse: #ffffff;
        --text-muted-inverse: rgba(255, 255, 255, 0.78);
        --text-subtle-inverse: rgba(255, 255, 255, 0.72);
        --text-subtle: #6f6f6f;
        --font-sans: "IBM Plex Sans", "Segoe UI", Arial, sans-serif;
        --font-mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--shell-bg);
        color: var(--text-primary);
        font-family: var(--font-sans);
      }

      button,
      textarea {
        font: inherit;
      }

      button,
      h1,
      h2,
      p,
      pre {
        margin: 0;
      }

      button {
        appearance: none;
        border: none;
        cursor: pointer;
      }

      textarea {
        appearance: none;
      }

      .app-shell {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        border: 1px solid var(--shell-border);
        background: var(--shell-bg);
      }

      .topbar {
        display: grid;
        gap: 20px;
        padding: 24px 24px 20px;
        background: var(--shell-bg);
      }

      .topbar--import {
        gap: 0;
        padding-bottom: 20px;
      }

      .tab-strip {
        display: flex;
        gap: 50px;
        width: 176px;
        border-bottom: 1px solid var(--metric-border);
      }

      .tab-button {
        padding: 0 0 12px;
        background: transparent;
        border-bottom: 2px solid transparent;
        color: var(--text-muted-inverse);
        font-size: 14px;
        line-height: 18px;
        text-align: left;
      }

      .tab-button.is-active {
        color: var(--text-inverse);
        border-bottom-color: var(--button-primary);
      }

      .header-metrics {
        display: grid;
        grid-template-columns: repeat(4, 100px);
        gap: 2px;
      }

      .header-metric {
        display: grid;
        gap: 2px;
        min-height: 47px;
        padding: 8px 10px 9px;
        background: var(--metric-bg);
      }

      .header-metric__label,
      .stat-card__label {
        color: var(--text-subtle-inverse);
        font-family: var(--font-mono);
        font-size: 10px;
        line-height: 12px;
        letter-spacing: 0.24px;
      }

      .header-metric__value {
        color: var(--text-inverse);
        font-size: 16px;
        line-height: 18px;
        font-weight: 400;
      }

      .content-area {
        display: grid;
        gap: 24px;
        flex: 1;
        padding: 24px;
        background: var(--content-bg);
      }

      .action-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .import-target {
        color: var(--text-primary);
        font-size: 12px;
        line-height: 16px;
      }

      .import-target strong {
        font-weight: 600;
      }

      .action-button {
        min-width: 92px;
        height: 40px;
        padding: 0 12px;
        font-size: 14px;
        line-height: 18px;
        font-weight: 600;
        transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
      }

      .action-button--primary {
        background: var(--button-primary);
        color: var(--text-inverse);
      }

      .action-button--primary:hover:not(:disabled) {
        background: var(--button-primary-hover);
      }

      .action-button--secondary {
        background: var(--button-secondary);
        color: var(--text-inverse);
      }

      .action-button--secondary:hover:not(:disabled) {
        background: var(--button-secondary-hover);
      }

      .action-button--ghost {
        min-width: 108px;
        border: 1px solid var(--button-primary);
        background: #ffffff;
        color: var(--button-primary);
      }

      .action-button:disabled {
        cursor: default;
        opacity: 0.4;
      }

      .panel {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 10px;
        padding: 16px;
        border-top: 3px solid var(--panel-top);
        background: var(--panel-bg);
        color: var(--text-inverse);
        overflow: hidden;
      }

      .panel--css {
        height: 260px;
      }

      .panel--cli {
        height: 120px;
      }

      .panel--editor {
        height: 260px;
      }

      .panel__title {
        font-size: 20px;
        line-height: 24px;
        font-weight: 600;
      }

      .panel__body {
        min-width: 0;
        min-height: 0;
      }

      .panel__body--code,
      .panel__body--editor {
        display: flex;
        flex: 1;
        padding: 12px;
        overflow: hidden;
      }

      .panel-code {
        width: 100%;
        height: 100%;
        overflow: auto;
        color: rgba(255, 255, 255, 0.88);
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 16px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .panel-code--compact {
        align-self: flex-start;
      }

      .css-input {
        width: 100%;
        height: 100%;
        padding: 0;
        border: none;
        outline: none;
        resize: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.88);
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 16px;
        overflow: auto;
      }

      .css-input::placeholder {
        color: rgba(255, 255, 255, 0.36);
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
      }

      .stat-card {
        display: grid;
        gap: 0;
        min-height: 52px;
        padding: 8px 10px;
        background: #ffffff;
      }

      .stat-card__label {
        color: var(--text-subtle);
      }

      .stat-card__value {
        color: var(--text-primary);
        font-size: 22px;
        line-height: 24px;
        font-weight: 300;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./ui.js"></script>
  </body>
</html>
